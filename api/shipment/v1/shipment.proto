syntax = "proto3";

package shipment.v1;

option go_package = "github.com/bazeeko/vektor-shipment/pkg/api/shipment/v1;shipmentpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

enum ShipmentStatus {
  Unknown = 0;
  Pending = 1;
  AwaitingDriver = 2;
  PickedUp = 3;
  InTransit = 4;
  Delayed = 5;
  AtTransferPoint = 6;
  Delivered = 7;
  Cancelled = 8;
}

message Shipment {
  string id = 1;
  string reference_number = 2;
  string origin = 3;
  string destination = 4;
  string driver_name = 5;
  string unit_id = 6;
  int64 shipment_cost = 7;
  int64 driver_revenue = 8;
  google.protobuf.Timestamp created_at = 9;
  ShipmentStatus status = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ShipmentEvent {
  string id = 1;
  string shipment_id = 2;
  ShipmentStatus status = 3;
  string details = 4;
  google.protobuf.Timestamp occurred_at = 5;
}

message CreateShipmentRequest {
  string origin = 1;
  string destination = 2;
  string driver_name = 3;
  string unit_id = 4;
}

message CreateShipmentResponse {
  string shipment_id = 1;
}

message GetShipmentRequest {
  string shipment_id = 1;
}

message GetShipmentResponse {
  Shipment shipment = 1;
}

message AddShipmentEventRequest {
  string shipment_id = 1;
  ShipmentStatus status = 2;
  string details = 3;
}

message GetShipmentEventsRequest {
  string shipment_id = 1;
}

message GetShipmentEventsResponse {
  repeated ShipmentEvent events = 1;
}

service ShipmentService {
  rpc CreateShipment(CreateShipmentRequest) returns (CreateShipmentResponse);
  rpc GetShipment(GetShipmentRequest) returns (GetShipmentResponse);
  rpc AddShipmentEvent(AddShipmentEventRequest) returns (google.protobuf.Empty);
  rpc GetShipmentEvents(GetShipmentEventsRequest) returns (GetShipmentEventsResponse);
}
